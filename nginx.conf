# /etc/nginx/sites-available/booking-room
# Copy to /etc/nginx/sites-available/booking-room
# then: ln -s /etc/nginx/sites-available/booking-room /etc/nginx/sites-enabled/
# and:  nginx -t && systemctl reload nginx

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_OR_IP;

    return 301 https://$host$request_uri;
}

# ── HTTPS (HTTP/2) ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;                          # eliminates browser 6-conn HTTP/1.1 limit
    server_name YOUR_DOMAIN_OR_IP;

    # --- TLS (Let's Encrypt / Certbot) ---
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- Proxy to Next.js (PM2) ---
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # General timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── SSE endpoint — must NOT be buffered ───────────────────────────────
    # Without these, Nginx holds the stream in memory and clients never
    # receive events until the buffer flushes (or the connection closes).
    location /api/events/updates {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # ── Critical SSE settings ─────────────────────────────────────────
        proxy_buffering        off;       # stream events immediately
        proxy_cache            off;
        proxy_read_timeout     3600s;     # keep long-lived SSE connections open
        proxy_send_timeout     3600s;
        chunked_transfer_encoding on;

        # X-Accel-Buffering is also set server-side in the route handler
        # as a belt-and-suspenders measure — Nginx respects it too.
    }
}
